name: Deploy

on:
  workflow_dispatch:
  # Auto-deploy on push disabled — deploying manually via CLI
  # push:
  #   branches: [master]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build

  deploy-infra:
    runs-on: ubuntu-latest
    needs: test
    environment: production
    outputs:
      s3_bucket: ${{ steps.outputs.outputs.s3_bucket }}
      cf_distribution_id: ${{ steps.outputs.outputs.cf_distribution_id }}
      cf_url: ${{ steps.outputs.outputs.cf_url }}
      api_url: ${{ steps.outputs.outputs.api_url }}
      cognito_domain: ${{ steps.outputs.outputs.cognito_domain }}
      cognito_client_id: ${{ steps.outputs.outputs.cognito_client_id }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Install CDK dependencies
        run: cd infra && npm ci
      - name: CDK Diff (safety check)
        run: cd infra && npx cdk diff 2>&1 | tee /tmp/cdk-diff.txt || true
      - name: Check for destructive changes
        run: |
          if grep -iE "(destroy|replace)" /tmp/cdk-diff.txt | grep -iE "(DynamoDB|Cognito|UserPool)" ; then
            echo "::error::CDK diff contains destructive changes to stateful resources!"
            exit 1
          fi
      - name: CDK Deploy
        run: cd infra && npx cdk deploy --require-approval broadening --outputs-file outputs.json
      - name: Extract outputs
        id: outputs
        run: |
          cd infra
          echo "s3_bucket=$(jq -r '.NwtStack.SiteBucketName' outputs.json)" >> $GITHUB_OUTPUT
          echo "cf_distribution_id=$(jq -r '.NwtStack.DistributionId' outputs.json)" >> $GITHUB_OUTPUT
          echo "cf_url=$(jq -r '.NwtStack.CloudFrontURL' outputs.json)" >> $GITHUB_OUTPUT
          echo "api_url=$(jq -r '.NwtStack.ApiUrl' outputs.json)" >> $GITHUB_OUTPUT
          echo "cognito_domain=$(jq -r '.NwtStack.CognitoDomain' outputs.json)" >> $GITHUB_OUTPUT
          echo "cognito_client_id=$(jq -r '.NwtStack.CognitoClientId' outputs.json)" >> $GITHUB_OUTPUT

  deploy-site:
    runs-on: ubuntu-latest
    needs: deploy-infra
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - run: npm ci
      - name: Build with production env
        env:
          VITE_API_URL: ${{ needs.deploy-infra.outputs.api_url }}
          VITE_COGNITO_DOMAIN: ${{ needs.deploy-infra.outputs.cognito_domain }}
          VITE_COGNITO_CLIENT_ID: ${{ needs.deploy-infra.outputs.cognito_client_id }}
          VITE_REDIRECT_URI: ${{ needs.deploy-infra.outputs.cf_url }}
        run: npm run build
      - name: Deploy assets to S3 (long cache)
        run: |
          aws s3 sync dist/ s3://${{ needs.deploy-infra.outputs.s3_bucket }}/ \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html" \
            --exclude "favicon.svg"
      - name: Deploy index.html (short cache)
        run: |
          aws s3 cp dist/index.html s3://${{ needs.deploy-infra.outputs.s3_bucket }}/index.html \
            --cache-control "public, max-age=60"
      - name: Deploy favicon (medium cache)
        run: |
          aws s3 cp dist/favicon.svg s3://${{ needs.deploy-infra.outputs.s3_bucket }}/favicon.svg \
            --cache-control "public, max-age=3600" || true
      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ needs.deploy-infra.outputs.cf_distribution_id }} \
            --paths "/index.html" "/favicon.svg"
